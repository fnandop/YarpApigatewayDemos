---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "orders-api-deployment"
  labels:
    app.kubernetes.io/name: "yarpapigatewaydemos-apphost"
    app.kubernetes.io/component: "orders-api"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "yarpapigatewaydemos-apphost"
        app.kubernetes.io/component: "orders-api"
        app.kubernetes.io/instance: "{{.Release.Name}}"
    spec:
      containers:
        - image: "{{ .Values.parameters.orders_api.orders_api_image }}"
          name: "orders-api"
          envFrom:
            - configMapRef:
                name: "orders-api-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.orders_api.port_http }}
            - name: "https"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.orders_api.port_https }}
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "yarpapigatewaydemos-apphost"
      app.kubernetes.io/component: "orders-api"
      app.kubernetes.io/instance: "{{.Release.Name}}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
