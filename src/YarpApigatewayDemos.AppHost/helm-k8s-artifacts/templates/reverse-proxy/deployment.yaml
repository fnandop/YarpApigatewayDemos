---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "reverse-proxy-deployment"
  labels:
    app.kubernetes.io/name: "yarpapigatewaydemos-apphost"
    app.kubernetes.io/component: "reverse-proxy"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "yarpapigatewaydemos-apphost"
        app.kubernetes.io/component: "reverse-proxy"
        app.kubernetes.io/instance: "{{.Release.Name}}"
    spec:
      containers:
        - image: "{{ .Values.parameters.reverse_proxy.reverse_proxy_image }}"
          name: "reverse-proxy"
          envFrom:
            - configMapRef:
                name: "reverse-proxy-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort:  {{ .Values.parameters.reverse_proxy.port_http }}
            - name: "https"
              protocol: "TCP"
              containerPort:  {{ .Values.parameters.reverse_proxy.port_https }}
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "yarpapigatewaydemos-apphost"
      app.kubernetes.io/component: "reverse-proxy"
      app.kubernetes.io/instance: "{{.Release.Name}}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
